<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fundo -->
  <rect x="0" y="0" width="500" height="200" rx="20" fill="#f5f5f5"/>
  <!-- Ícone de planilha -->
  <rect x="40" y="40" width="80" height="100" rx="10" fill="url(#grad1)" />
  <line x1="40" y1="70" x2="120" y2="70" stroke="#ffffff" stroke-width="2"/>
  <line x1="40" y1="100" x2="120" y2="100" stroke="#ffffff" stroke-width="2"/>
  <line x1="40" y1="130" x2="120" y2="130" stroke="#ffffff" stroke-width="2"/>
  <!-- Check de aprovação -->
  <polyline points="60,100 75,115 105,75"
    fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Texto principal -->
  <text x="150" y="90" font-family="Arial, sans-serif" font-size="28" fill="#333">
    Estudo Aprovado
  </text>
  <!-- Subtítulo -->
  <text x="150" y="120" font-family="Arial, sans-serif" font-size="16" fill="#666">
    Planilha de Estudos
  </text>
  <!-- Linha decorativa -->
  <line x1="150" y1="130" x2="420" y2="130" stroke="#4CAF50" stroke-width="3"/>
</svg>
